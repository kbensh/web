<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    <title>$title$</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" data-manual></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bibtex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
</head>

<body>
    <header>
        <div class="column">
            <h1 class="title" style="display: flex; align-items: center; flex-wrap: wrap;">
<img src="./img/logo.svg" alt="Koala Logo" class="logo">
        <div style="display: flex; align-items: baseline; gap: 2rem;">
            <div class="subtitle" style="margin-top: 0;">The Koala benchmark suite for the Shell</div>
            <div class="navigation">
                <div class="row references" style="display: flex; gap: 1rem; font-size: 16px; font-weight: 500;">
                    <a class="source btn-primary" href="https://github.com/kbensh/koala">Source</a>
                    <a class="paper btn-secondary" href="https://nikos.vasilak.is/p/koala:atc:2025.pdf">Paper</a>
                    <span class="gh-stat" id="gh-stars" hidden></span><span class="gh-stat" id="gh-forks" hidden></span>
                </div>
            </div>
        </div>
        </h1>
        </div>
</header>

<main>
$body$
    </main>

    <footer class="site-footer">
        <img src="./img/logo.svg" alt="Koala Logo" class="footer-logo">
        <div class="footer-text">
            Find out more about Shell research by <a href="https://atlas.cs.brown.edu/">Atlas</a> @ Brown University.
        </div>
        <div class="footer-meta">
            <span>v$version$</span>
            <span>·</span>
            <span>built $updated$</span>
            <span>·</span>
            <a href="#" class="to-top">back to top ↑</a>
        </div>
    </footer>

</body>

<script>
document.querySelectorAll('a[href]').forEach(function(link) {
  var href = link.getAttribute('href') || '';
  if (href.charAt(0) === '#' || href.indexOf('javascript:') === 0) return;
  link.setAttribute('target', '_blank');
  link.setAttribute('rel', 'noopener noreferrer');
});
document.querySelectorAll('.to-top').forEach(function(a) {
  a.addEventListener('click', function(e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});
</script>

<script src="./js/issues.js"></script>
<script src="./js/data.js"></script>
<script src="./js/copy.js"></script>
<script src="./js/repo-stats.js"></script>

</html>
